databases:
  - name: dealership-db
    plan: free

services:
  - type: web
    name: dealership-backend
    env: docker
    plan: free
    region: ohio
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DB_URL
        fromDatabase:
          name: dealership-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: dealership-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: dealership-db
          property: password
      - key: JWT_SECRET
        generateValue: true
