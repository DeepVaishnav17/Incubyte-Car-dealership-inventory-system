version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dealership-db
    environment:
      POSTGRES_DB: dealership
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
