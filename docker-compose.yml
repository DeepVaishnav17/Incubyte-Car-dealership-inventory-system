version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dealership-db
    environment:
      POSTGRES_DB: dealership
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dealership"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: dealership-backend
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/dealership
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: dealership-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
